# Fluent Bit — ships all IronNest container logs to Wazuh OpenSearch.
# Reads Docker JSON log files directly; uses the native opensearch output
# plugin which avoids the /_license probe that breaks Filebeat with OpenSearch.
#
# Logs land in index ironnest-containers-YYYY.MM.DD.
# Create index pattern ironnest-containers-* in Wazuh dashboard to query them.

[SERVICE]
    Flush         5
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Tag               docker.*
    Parser            docker
    Refresh_Interval  5
    DB                /var/lib/fluent-bit/docker.db
    Skip_Long_Lines   On

[FILTER]
    Name   lua
    Match  docker.*
    script /fluent-bit/scripts/enrich_container.lua
    call   enrich_container

[OUTPUT]
    Name                opensearch
    Match               docker.*
    Host                wazuh.indexer
    Port                9200
    HTTP_User           admin
    HTTP_Passwd         ${WAZUH_INDEXER_PASSWORD}
    tls                 On
    tls.verify          On
    tls.ca_file         /certs/root-ca.pem
    Logstash_Format     On
    Logstash_Prefix     ironnest-containers
    Logstash_DateFormat %Y.%m.%d
    Suppress_Type_Name  On
    Trace_Error         On
