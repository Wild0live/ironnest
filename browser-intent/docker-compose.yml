name: browser-intent

networks:
  platform-net:
    external: true
  platform-egress:
    external: true
  browser-internal:
    driver: bridge
    internal: true
  ingress:
    driver: bridge

volumes:
  # Shared inbox written by Hermes (uid 10000) and read by the browser-intent
  # worker (uid 1001 pwuser). Hermes mounts it writable at /opt/uploads-out;
  # we mount it read-only at /uploads/from-hermes. See hermes/docker-compose.yml.
  hermes-to-browser-intent:
    external: true

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  infisical-agent:
    # Digest-pin upstream `infisical/cli` rather than carrying a "-patched"
    # local image. The previous Dockerfile.infisical-cli wrapped this exact
    # digest with no RUN/COPY — it was byte-identical to upstream, so the
    # ":0.43.76-patched" tag advertised a fix that didn't exist there. The
    # actual workaround for the multi-path etag bug lives in
    # agent-config/secrets.tmpl (single recursive listSecrets call); see
    # README "Infisical Agent sidecar". When upstream cuts a release that
    # fixes the etag bug, bump the digest below and re-test rotation.
    image: infisical/cli@sha256:dba406b35e5819632412c561bfa46e6185e04c6d76175dc82bf97c4ff53745d7
    container_name: browser-intent-infisical-agent
    restart: unless-stopped
    entrypoint: ["sh", "/agent-config/entrypoint.sh"]
    env_file: ./.env
    logging: *default-logging
    volumes:
      - ./agent-config:/agent-config:ro
      - ./secrets-runtime:/secrets
    tmpfs:
      - /tmp:size=1m,mode=0700
    networks:
      - platform-egress
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "test -f /secrets/.env"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 10s

  worker:
    build: { context: ., dockerfile: Dockerfile.worker }
    image: platform/browser-intent-worker:0.1.0
    container_name: browser-intent-worker
    restart: unless-stopped
    env_file:
      - path: ./secrets-runtime/.env
        required: false
    logging: *default-logging
    environment:
      NODE_ENV: production
      BROWSER_INTENT_POLICY_PATH: /app/policies/sites.json
      # Headless toggle. Default is true (headless). Flip to "false" and
      # `docker compose up -d worker` (NO rebuild needed — the Dockerfile
      # already wraps node with xvfb-run, so a virtual display is ready
      # whenever Chromium asks for one) to escalate to non-headless
      # Chromium for portals that fingerprint the headless compositor.
      # NOTE 2026-05-16: headed mode does NOT defeat TLS JA3 fingerprinting
      # (Playwright bundles its own Chromium with BoringSSL, identical in
      # headed and headless), so flipping this won't unblock Hi-Precision.
      # Useful only for sites that detect headless-specific WebGL/canvas
      # signals; for JA3 issues, the path is chromium.connectOverCDP() to
      # a real Chrome instance instead.
      BROWSER_INTENT_HEADLESS: "true"
      # Shared secret with the MCP service. Generate once per stack with
      # `openssl rand -hex 32` and put in .env. Compose will refuse to start
      # without it (intentional — running without breaks the auth invariant
      # on the worker's only ingress path).
      BROWSER_INTENT_WORKER_SECRET: "${BROWSER_INTENT_WORKER_SECRET:?missing BROWSER_INTENT_WORKER_SECRET in .env - generate with: openssl rand -hex 32}"
      HTTP_PROXY: "http://squid:3128"
      HTTPS_PROXY: "http://squid:3128"
      NO_PROXY: "mcp,worker,infisical,adguard,squid,localhost,127.0.0.1,.local"
      http_proxy: "http://squid:3128"
      https_proxy: "http://squid:3128"
      no_proxy: "mcp,worker,infisical,adguard,squid,localhost,127.0.0.1,.local"
    volumes:
      - ./policies:/app/policies:ro
      # Read-only mount of the Infisical-sidecar-rendered secrets dir. The
      # worker re-reads /secrets/.env on each credential lookup (mtime-cached)
      # so rotated values land without --force-recreate. env_file above is the
      # bootstrap fallback (populates process.env at container start).
      - ./secrets-runtime:/secrets:ro
      - ./uploads:/uploads:ro
      - hermes-to-browser-intent:/uploads/from-hermes:ro
      # Writable result-PDF dropbox. hi_precision's get_results fetches each
      # session-cookie-protected PDF through the Playwright request context
      # and writes it here; the LLM sees a local download_path instead of a
      # cookie-gated URL. Auto-pruned (24h default) per-call by the extractor.
      # Lives at /results (NOT under /uploads) because /uploads is mounted ro
      # and Docker can't create a bind-mount target inside a ro tree.
      - ./uploads-results:/results
    networks:
      browser-internal:
      platform-net:
        ipv4_address: 172.30.0.30
    dns:
      - 172.30.0.10
    depends_on:
      infisical-agent:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:18902/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp:
    build: { context: ., dockerfile: Dockerfile.mcp }
    image: platform/browser-intent-mcp:0.1.0
    container_name: browser-intent-mcp
    restart: unless-stopped
    logging: *default-logging
    environment:
      NODE_ENV: production
      BROWSER_INTENT_POLICY_PATH: /app/policies/sites.json
      BROWSER_INTENT_CLIENTS_PATH: /app/policies/clients.json
      BROWSER_WORKER_URL: http://browser-intent-worker:18902
      BROWSER_INTENT_HTTP_PORT: "18901"
      # Per-client tokens. Each one corresponds to an entry in
      # policies/clients.json (matched by tokenEnvVar). Clients whose env var
      # is unset are silently skipped — adding a new entry to clients.json is
      # a no-op until the matching token is provisioned in .env.
      BROWSER_INTENT_MCP_TOKEN: "${BROWSER_INTENT_MCP_TOKEN:?missing BROWSER_INTENT_MCP_TOKEN in .env - generate one with openssl rand -hex 32}"
      BROWSER_INTENT_MCP_TOKEN_DR_SMITH: "${BROWSER_INTENT_MCP_TOKEN_DR_SMITH:-}"
      # Shared secret used to authenticate every MCP→worker call. Must match
      # the value set on the worker service; missing here will cause the
      # worker to 401 every dispatch.
      BROWSER_INTENT_WORKER_SECRET: "${BROWSER_INTENT_WORKER_SECRET:?missing BROWSER_INTENT_WORKER_SECRET in .env - generate with: openssl rand -hex 32}"
      # Maintainer-only: when "true", diagnose_* tools appear in tools/list.
      # Off by default so the LLM never sees these in normal operation.
      BROWSER_INTENT_ENABLE_DIAGNOSTICS: "${BROWSER_INTENT_ENABLE_DIAGNOSTICS:-}"
    volumes:
      - ./policies:/app/policies:ro
    ports:
      - "127.0.0.1:18901:18901"
    networks:
      ingress:
      platform-net:
    depends_on:
      worker:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:18901/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
