# Hermes Agent — NousResearch hermes-agent v2026.5.7 + ttyd browser terminal.
# On-demand stack: start with ./hermes/start.sh (do not add to bootstrap.sh).
#
# Five services:
#   1. hermes-ttyd:           ttyd wrapping `hermes` TUI (browser-accessible terminal)
#   2. hermes-gateway:        persistent messaging gateway for the `default` profile (@DrSmithVBot)
#   3. hermes-gateway-wifey:  persistent messaging gateway for the `wifey`   profile (@may192007_bot)
#   4. hermes-gateway-steve:  persistent messaging gateway for the `steve`   profile
#   5. hermes-gateway-mark:   persistent messaging gateway for the `mark`    profile
#
# Each gateway = one Telegram bot. Tokens are scoped per-profile in Infisical
# (NOT in /opt/data/profiles/<p>/.env — those files exist but are shadowed by
# Infisical injection):
#   default: Infisical path /          → @DrSmithVBot
#   wifey:   Infisical path /wifey     → @may192007_bot
#   steve:   Infisical path /steve     → @SteveArmstrongBot
#   mark:    Infisical path /mark      → @MarkGordonBot
#
# Each non-default folder has a Secret Link (import) from / so shared keys
# (OPENROUTER_API_KEY, GEMINI_API_KEY, …) flow through. The per-folder
# TELEGRAM_BOT_TOKEN overrides the one at / for that gateway.
# See platform/README.md "Per-workload scoping" for the architecture rationale.
#
# Secrets flow (option 3 — process-memory only):
#   Each service starts via /usr/local/bin/with-infisical, which logs in to the
#   local Infisical at http://infisical:8090 (Universal Auth machine identity)
#   and exec's `infisical run --path=$INFISICAL_PATH --include-imports` —
#   secrets are injected as env vars into the wrapped process, never written
#   to disk. Machine identity creds come from ./.env (gitignored).
#
# All outbound HTTPS (LLM API calls to OpenRouter, etc.) routes through Squid.
# hermes-ttyd uses the `local` terminal backend — shell commands run inside the
# container itself; no Docker socket is mounted or needed.
#
# Port: 7682 (7681 is openclaw-ttyd)

name: hermes

networks:
  platform-net:
    external: true              # DNS (AdGuard 172.30.0.10), Squid proxy, Infisical (service name "infisical")
  # Stack-local bridge: needed ONLY so Docker can publish 127.0.0.1:7682 to host.
  ingress:
    driver: bridge

volumes:
  hermes-data:
    name: hermes_hermes-data    # Hermes home: config, sessions, memories, skills
  # Shared inbox for handing files (e.g. Telegram-cached images) to
  # browser-intent's submit_claim. Hermes writes here as uid 10000 with
  # mode 0644 (umask 022); browser-intent worker mounts the same volume
  # read-only at /uploads/from-hermes. Workflow:
  #   cp /opt/data/cache/images/img_X.jpg /opt/uploads-out/
  #   then call submit_claim with receipts=["/uploads/from-hermes/img_X.jpg"]
  hermes-to-browser-intent:
    external: true
  # Shared outbox written by the browser-intent worker (uid 1001 pwuser
  # at /results) and read by Hermes (uid 10000) here at /opt/uploads-in.
  # Holds result PDFs that get_results downloads. Path translation: an
  # MCP response with download_path="/results/hi_precision/<file>.pdf"
  # is readable from Hermes at "/opt/uploads-in/hi_precision/<file>.pdf".
  # Files are mode 0644 from the worker's default umask, so world-read
  # is sufficient and no shared GID is needed. Read-only on this side so
  # nothing Hermes does can corrupt the worker's outputs.
  browser-intent-to-hermes:
    external: true

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── Hermes browser terminal (ttyd) ───────────────────────────────────────────
  # ttyd wraps the `hermes` TUI. Opening the browser terminal starts a fresh
  # interactive Hermes session; state (memories, sessions, config) persists in
  # the hermes-data volume across sessions.
  #
  # TERMINAL_ENV=local — shell commands run inside this container.
  # No Docker socket mounted; no access to the host daemon.
  hermes-ttyd:
    build:
      context: .
      dockerfile: Dockerfile
    image: platform/hermes-agent:v2026.5.7-patched
    container_name: hermes-ttyd
    restart: unless-stopped
    command:
      - with-infisical
      - sh
      - -c
      - |
        mkdir -p /opt/data/home
        export TELEGRAM_HOME_CHANNEL="$${TELEGRAM_HOME_CHANNEL:-$${TELEGRAM_ALLOWED_USERS:-}}"
        export TELEGRAM_HOME_CHANNEL_NAME="$${TELEGRAM_HOME_CHANNEL_NAME:-IronNest Hermes}"
        touch /opt/data/.profile /opt/data/home/.profile
        for profile in /opt/data/.profile /opt/data/home/.profile; do
          if ! grep -Fq '/opt/hermes/.venv/bin' "$$profile"; then
            printf '\n# IronNest: expose Hermes CLI to ttyd and local tool subprocesses.\nexport PATH="/opt/hermes/.venv/bin:$$PATH"\n' >> "$$profile"
          fi
        done
        /opt/hermes/.venv/bin/hermes dashboard --host 0.0.0.0 --insecure --no-open &
        if [ -n "$${HERMES_TTYD_USERNAME:-}" ] && [ -n "$${HERMES_TTYD_PASSWORD:-}" ]; then
          exec ttyd --port=7682 --writable --credential "$${HERMES_TTYD_USERNAME}:$${HERMES_TTYD_PASSWORD}" bash -lc 'cd /opt/data/workspace; echo "Hermes ready. Run: hermes auth add openai-codex --type oauth"; exec bash'
        else
          exec ttyd --port=7682 --writable bash -lc 'cd /opt/data/workspace; echo "Hermes ready. Run: hermes auth add openai-codex --type oauth"; exec bash'
        fi
    env_file:
      - path: ./.env              # Infisical machine identity creds for `with-infisical`
    environment:
      HERMES_UID: "10000"
      HERMES_GID: "10000"
      # Infisical project that holds Hermes' secrets — fetched at process start
      # by /usr/local/bin/with-infisical (see Dockerfile + with-infisical.sh).
      INFISICAL_PROJECT_ID: "2777cf9a-8ed7-43d0-84ed-8cb48f9b03ad"
      # Make the Hermes console script visible to both ttyd shells and Hermes'
      # own local terminal/tool subprocesses.
      PATH: "/opt/hermes/.venv/bin:/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      # Use local terminal backend — shell commands run in this container.
      # Avoids needing the Docker socket for the agent's tool calls.
      TERMINAL_ENV: "local"
      # All outbound HTTPS routed through Squid (openrouter.ai allowlisted).
      HTTPS_PROXY: "http://squid:3128"
      HTTP_PROXY: "http://squid:3128"
      NO_PROXY: "infisical,adguard,squid,socket-proxy,browser-intent-mcp,browser-intent-worker,localhost,127.0.0.1,.local"
      https_proxy: "http://squid:3128"
      http_proxy: "http://squid:3128"
      no_proxy: "infisical,adguard,squid,socket-proxy,browser-intent-mcp,browser-intent-worker,localhost,127.0.0.1,.local"
    logging: *default-logging
    volumes:
      - hermes-data:/opt/data
      - hermes-to-browser-intent:/opt/uploads-out
      - browser-intent-to-hermes:/opt/uploads-in:ro
    ports:
      - "127.0.0.1:7682:7682"
      - "127.0.0.1:9119:9119"
    networks:
      - platform-net              # Squid access + DNS
      - ingress                   # host port publishing
    dns:
      - 172.30.0.10               # AdGuard
    cap_drop:
      - ALL
    cap_add:
      - CHOWN      # entrypoint chowns /opt/data on first run
      - SETUID     # gosu drops from root → hermes user
      - SETGID     # gosu group remapping
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-so", "/dev/null", "http://localhost:7682"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Hermes messaging gateway ───────────────────────────────────────────────
  # Runs Telegram/other platform adapters as a Compose-managed service so
  # messaging stays up across ttyd terminal closes and container restarts.
  hermes-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: platform/hermes-agent:v2026.5.7-patched
    container_name: hermes-gateway
    restart: unless-stopped
    command:
      - with-infisical
      - sh
      - -c
      - |
        export TELEGRAM_HOME_CHANNEL="$${TELEGRAM_HOME_CHANNEL:-$${TELEGRAM_ALLOWED_USERS:-}}"
        export TELEGRAM_HOME_CHANNEL_NAME="$${TELEGRAM_HOME_CHANNEL_NAME:-IronNest Hermes}"
        exec hermes gateway run
    env_file:
      - path: ./.env              # Infisical machine identity creds for `with-infisical`
    environment:
      HERMES_UID: "10000"
      HERMES_GID: "10000"
      INFISICAL_PROJECT_ID: "2777cf9a-8ed7-43d0-84ed-8cb48f9b03ad"
      PATH: "/opt/hermes/.venv/bin:/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      TERMINAL_ENV: "local"
      HTTPS_PROXY: "http://squid:3128"
      HTTP_PROXY: "http://squid:3128"
      NO_PROXY: "infisical,adguard,squid,socket-proxy,browser-intent-mcp,browser-intent-worker,localhost,127.0.0.1,.local"
      https_proxy: "http://squid:3128"
      http_proxy: "http://squid:3128"
      no_proxy: "infisical,adguard,squid,socket-proxy,browser-intent-mcp,browser-intent-worker,localhost,127.0.0.1,.local"
    logging: *default-logging
    volumes:
      - hermes-data:/opt/data
      - hermes-to-browser-intent:/opt/uploads-out
      - browser-intent-to-hermes:/opt/uploads-in:ro
    networks:
      - platform-net
    dns:
      - 172.30.0.10
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'hermes gateway run' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Hermes messaging gateway — `wifey` profile ────────────────────────────
  # Second Hermes gateway, runs against the `wifey` profile so a separate
  # Telegram bot (token in /opt/data/profiles/wifey/.env) gets its own poller.
  # Shares the hermes-data volume with hermes-gateway; lock contention is
  # avoided because each profile has its own gateway.lock under its profile dir.
  hermes-gateway-wifey:
    build:
      context: .
      dockerfile: Dockerfile
    image: platform/hermes-agent:v2026.5.7-patched
    container_name: hermes-gateway-wifey
    restart: unless-stopped
    command:
      - with-infisical
      - sh
      - -c
      - |
        export TELEGRAM_HOME_CHANNEL="$${TELEGRAM_HOME_CHANNEL:-$${TELEGRAM_ALLOWED_USERS:-}}"
        export TELEGRAM_HOME_CHANNEL_NAME="$${TELEGRAM_HOME_CHANNEL_NAME:-IronNest Hermes (wifey)}"
        exec hermes -p wifey gateway run
    env_file:
      - path: ./.env
    environment:
      HERMES_UID: "10000"
      HERMES_GID: "10000"
      INFISICAL_PROJECT_ID: "2777cf9a-8ed7-43d0-84ed-8cb48f9b03ad"
      INFISICAL_PATH: "/wifey"           # per-profile bot token at /wifey; shared keys imported from /
      PATH: "/opt/hermes/.venv/bin:/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      TERMINAL_ENV: "local"
      HTTPS_PROXY: "http://squid:3128"
      HTTP_PROXY: "http://squid:3128"
      NO_PROXY: "infisical,adguard,squid,socket-proxy,browser-intent-mcp,browser-intent-worker,localhost,127.0.0.1,.local"
      https_proxy: "http://squid:3128"
      http_proxy: "http://squid:3128"
      no_proxy: "infisical,adguard,squid,socket-proxy,browser-intent-mcp,browser-intent-worker,localhost,127.0.0.1,.local"
    logging: *default-logging
    volumes:
      - hermes-data:/opt/data
      - hermes-to-browser-intent:/opt/uploads-out
      - browser-intent-to-hermes:/opt/uploads-in:ro
    networks:
      - platform-net
    dns:
      - 172.30.0.10
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'hermes -p wifey gateway run' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Hermes messaging gateway — `steve` profile ────────────────────────────
  # Third Hermes gateway, runs against the `steve` profile so a separate
  # Telegram bot (token in /opt/data/profiles/steve/.env) gets its own poller.
  # Shares the hermes-data volume with the other gateways; lock contention is
  # avoided because each profile has its own gateway.lock under its profile dir.
  hermes-gateway-steve:
    build:
      context: .
      dockerfile: Dockerfile
    image: platform/hermes-agent:v2026.5.7-patched
    container_name: hermes-gateway-steve
    restart: unless-stopped
    command:
      - with-infisical
      - sh
      - -c
      - |
        export TELEGRAM_HOME_CHANNEL="$${TELEGRAM_HOME_CHANNEL:-$${TELEGRAM_ALLOWED_USERS:-}}"
        export TELEGRAM_HOME_CHANNEL_NAME="$${TELEGRAM_HOME_CHANNEL_NAME:-IronNest Hermes (steve)}"
        exec hermes -p steve gateway run
    env_file:
      - path: ./.env
    environment:
      HERMES_UID: "10000"
      HERMES_GID: "10000"
      INFISICAL_PROJECT_ID: "2777cf9a-8ed7-43d0-84ed-8cb48f9b03ad"
      INFISICAL_PATH: "/steve"           # per-profile bot token at /steve; shared keys imported from /
      PATH: "/opt/hermes/.venv/bin:/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      TERMINAL_ENV: "local"
      HTTPS_PROXY: "http://squid:3128"
      HTTP_PROXY: "http://squid:3128"
      NO_PROXY: "infisical,adguard,squid,socket-proxy,browser-intent-mcp,browser-intent-worker,localhost,127.0.0.1,.local"
      https_proxy: "http://squid:3128"
      http_proxy: "http://squid:3128"
      no_proxy: "infisical,adguard,squid,socket-proxy,browser-intent-mcp,browser-intent-worker,localhost,127.0.0.1,.local"
    logging: *default-logging
    volumes:
      - hermes-data:/opt/data
      - hermes-to-browser-intent:/opt/uploads-out
      - browser-intent-to-hermes:/opt/uploads-in:ro
    networks:
      - platform-net
    dns:
      - 172.30.0.10
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'hermes -p steve gateway run' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Hermes messaging gateway — `mark` profile ─────────────────────────────
  # Fourth Hermes gateway, runs against the `mark` profile so a separate
  # Telegram bot (token in /opt/data/profiles/mark/.env) gets its own poller.
  # Shares the hermes-data volume with the other gateways; lock contention is
  # avoided because each profile has its own gateway.lock under its profile dir.
  hermes-gateway-mark:
    build:
      context: .
      dockerfile: Dockerfile
    image: platform/hermes-agent:v2026.5.7-patched
