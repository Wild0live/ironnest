# Infisical + Postgres + Redis.
# Infisical exposes UI on 127.0.0.1:8080 and is reachable from OpenClaw via platform-net.
# Postgres/Redis stay on an internal stack-private network — never visible to other stacks.
# SMTP (Gmail) needs raw TCP out → Infisical joins platform-egress.

name: secrets

networks:
  platform-net:
    external: true              # openclaw ↔ infisical
  platform-egress:
    external: true              # infisical → Gmail SMTP (non-HTTP, can't use Squid)
  secrets-internal:
    driver: bridge
    internal: true              # postgres/redis never reachable outside this stack

volumes:
  postgres-data:
    name: rancher-stack_postgres-data
    external: true
  redis-data:
    name: rancher-stack_redis-data
    external: true

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    build: { context: ., dockerfile: Dockerfile.postgres }
    image: platform/postgres:16.13-alpine-patched
    container_name: infisical-postgres
    restart: unless-stopped
    env_file: ./.env
    logging: *default-logging
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - secrets-internal
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    build: { context: ., dockerfile: Dockerfile.redis }
    image: platform/redis:7.4.8-alpine-patched
    container_name: infisical-redis
    restart: unless-stopped
    command: ["sh", "-c", "exec redis-server --requirepass \"$$REDIS_PASSWORD\""]
    env_file: ./.env
    logging: *default-logging
    volumes:
      - redis-data:/data
    networks:
      - secrets-internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Infisical ────────────────────────────────────────────────────────────────
  infisical:
    build: { context: ., dockerfile: Dockerfile.infisical }
    image: platform/infisical:pg-36438985-patched
    container_name: infisical
    restart: unless-stopped
    env_file: ./.env
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "8090"                  # avoid port 8080 — Rancher Desktop WSL2 DNAT intercepts all :8080 traffic
    ports:
      - "127.0.0.1:18090:8090"     # UI — localhost only. Host port ≠ container port so Rancher Desktop DNAT targets
                                   # :18090, not :8090, leaving intra-network container traffic on :8090 unintercepted.
    networks:
      - secrets-internal           # talks to postgres + redis
      - platform-net               # reachable from openclaw (service name: infisical)
      - platform-egress            # raw TCP to smtp.gmail.com:587
    dns:
      - 172.30.0.10                # AdGuard — all DNS goes through the filter
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/api/status 2>/dev/null | grep -q 'Ok'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
