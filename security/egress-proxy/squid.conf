# Squid forward proxy with per-source hostname allowlists.
# Policy: deny by default; allow only what each stack needs.
#
# How stacks reach this proxy:
#   HTTP_PROXY=http://squid:3128
#   HTTPS_PROXY=http://squid:3128
#
# Squid identifies sources by IP — we keep allowlists scoped by source subnet/hostname
# so one stack can't piggy-back on another's allowlist.

http_port 3128

# ── Source ACLs (who is calling) ───────────────────────────────────────────────
# Containers on platform-net get Docker's embedded DNS. We'll match by container
# hostname via the HTTP Host/CONNECT request, but Squid can't do that reliably,
# so we match by source IP range instead. The platform-net subnet is the whole
# allowlist — any container on it can egress, but only to destinations its
# upstream ACL permits. Per-stack restrictions are enforced via separate ACLs
# on the destination dstdomain lines below.
acl platform_clients src 10.0.0.0/8
acl platform_clients src 172.16.0.0/12
acl platform_clients src 192.168.0.0/16

# ── Destination allowlists (where they may go) ─────────────────────────────────
# Everything here must be a resolvable hostname. AdGuard DNS still filters at
# resolution time, so this is a second layer on top of DNS.

# OpenClaw — AI provider APIs
acl dst_openclaw dstdomain .anthropic.com
acl dst_openclaw dstdomain .openai.com
acl dst_openclaw dstdomain .chatgpt.com
acl dst_openclaw dstdomain .cohere.ai
acl dst_openclaw dstdomain .mistral.ai

# Infisical — only its internal UI+API via platform-net (not via this proxy).
# SMTP goes direct via platform-egress (not HTTP, can't proxy).
# No Squid allowlist entries needed for Infisical.

# Wazuh — threat intel, CVE feeds, ruleset updates
acl dst_wazuh dstdomain .wazuh.com
acl dst_wazuh dstdomain .cve.mitre.org
acl dst_wazuh dstdomain .nvd.nist.gov
acl dst_wazuh dstdomain .github.com

# Trivy — CVE DB mirror (pulled from GitHub container registry + OCI mirrors)
acl dst_trivy dstdomain ghcr.io
acl dst_trivy dstdomain .githubusercontent.com
acl dst_trivy dstdomain aquasecurity.github.io
acl dst_trivy dstdomain .aquasec.com
acl dst_trivy dstdomain mirror.gcr.io
acl dst_trivy dstdomain storage.googleapis.com
acl dst_trivy dstdomain .docker.io
acl dst_trivy dstdomain production.cloudflare.docker.com

# AdGuard — DoH upstreams go via platform-egress directly (raw HTTPS, port 443).
# Listed here for completeness in case AdGuard ever issues HTTP requests.
acl dst_adguard dstdomain .quad9.net
acl dst_adguard dstdomain .cloudflare-dns.com
acl dst_adguard dstdomain dns.google

# Telegram
acl telegram dstdomain .telegram.org

# npm — needed by OpenClaw's Codex ACP plugin (npx @zed-industries/codex-acp)
acl dst_npm dstdomain registry.npmjs.org

# Combined allowlist — any destination any stack is allowed to reach
acl dst_allowed_combined dstdomain .anthropic.com .openai.com .chatgpt.com .cohere.ai .mistral.ai
acl dst_allowed_combined dstdomain .wazuh.com .cve.mitre.org .nvd.nist.gov .github.com
acl dst_allowed_combined dstdomain ghcr.io .githubusercontent.com aquasecurity.github.io .aquasec.com
acl dst_allowed_combined dstdomain mirror.gcr.io storage.googleapis.com .docker.io production.cloudflare.docker.com
acl dst_allowed_combined dstdomain .quad9.net .cloudflare-dns.com dns.google
acl dst_allowed_combined dstdomain .telegram.org
acl dst_allowed_combined dstdomain registry.npmjs.org

# ── Ports & methods ────────────────────────────────────────────────────────────
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# ── Access rules ───────────────────────────────────────────────────────────────
# Allow cache manager from loopback only (uses Squid's built-in localhost ACL).
http_access allow localhost manager
http_access allow platform_clients dst_allowed_combined
http_access allow CONNECT telegram
http_access deny all

# ── Cache & logging ────────────────────────────────────────────────────────────
# Small memory cache; CVE feeds benefit from it.
cache_mem 64 MB
maximum_object_size_in_memory 512 KB
cache_dir ufs /var/spool/squid 100 16 256

access_log stdio:/var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# Privacy hygiene
forwarded_for off
via off
httpd_suppress_version_string on

# Don't cache failures aggressively
negative_ttl 0 seconds

