# Squid forward proxy — allow by default with malicious IP/domain blocklists.
# Policy: allow all egress unless destination is on a known-malicious IP/domain list.
# AdGuard DNS provides a first layer of filtering at resolution time.
#
# How stacks reach this proxy:
#   HTTP_PROXY=http://squid:3128
#   HTTPS_PROXY=http://squid:3128
#
# Blocklists are maintained by the blocklist-updater container (Spamhaus DROP/EDROP,
# Emerging Threats, Feodo Tracker) and written to a shared volume. An inotifywait
# watchdog inside this container triggers squid -k reconfigure on each update.

http_port 3128

# ── Source ACLs (who is calling) ───────────────────────────────────────────────
acl platform_clients src 10.0.0.0/8
acl platform_clients src 172.16.0.0/12
acl platform_clients src 192.168.0.0/16
# Browser Intent worker gets a static IP so policy can be tightened in future
acl browser_intent_clients src 172.30.0.30

# ── Browser Intent — allowlisted portals ───────────────────────────────────────
# The worker also enforces these domains inside Playwright before any request
# leaves the browser context (defence-in-depth).
acl dst_browser_intent dstdomain .colfinancial.com
acl dst_browser_intent dstdomain .maxihealth.com.ph
acl dst_browser_intent dstdomain .april.fr
acl dst_browser_intent dstdomain .hi-precision.com.ph

# ── Threat blocklists (allow-by-default model) ─────────────────────────────────
# Files are written by the blocklist-updater container every 6 hours.
# squid -k reconfigure is triggered automatically when the files are replaced.
acl malicious_dst dst "/etc/squid/blocklists/malicious_ips.txt"
acl malicious_dstdomain dstdomain "/etc/squid/blocklists/malicious_domains.txt"

# ── Ports & methods ────────────────────────────────────────────────────────────
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# ── Access rules ───────────────────────────────────────────────────────────────
http_access allow localhost manager
http_access deny malicious_dst
http_access deny malicious_dstdomain
http_access allow platform_clients
http_access deny all

# ── Cache & logging ────────────────────────────────────────────────────────────
# Small memory cache; CVE feeds benefit from it.
cache_mem 64 MB
maximum_object_size_in_memory 512 KB
cache_dir ufs /var/spool/squid 100 16 256

access_log /dev/stdout squid
cache_log /var/log/squid/cache.log

# Privacy hygiene
forwarded_for off
via off
httpd_suppress_version_string on

# Don't cache failures aggressively
negative_ttl 0 seconds

# ── Connection timeouts ────────────────────────────────────────────────────────
# Prevents hung HTTPS CONNECT tunnels (e.g. LLM API calls that never respond).
# connect_timeout: how long to wait for the upstream TCP handshake.
# read_timeout:    how long an established tunnel may stay idle with no data.
# If the codex/gpt model stops streaming, the tunnel is closed after 90 s and
# OpenClaw's fallback chain takes over.
connect_timeout 15 seconds
read_timeout 90 seconds

