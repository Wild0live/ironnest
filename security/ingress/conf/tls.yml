# TLS configuration — loaded dynamically from /etc/traefik/conf/.
# The self-signed cert is generated by ../generate-certs.sh and stored
# in the traefik-certs named volume, mounted at /certs.
#
# To use Let's Encrypt instead:
#   1. Remove the tls.stores block below.
#   2. Add a certificatesResolvers block to traefik.yml (acme section).
#   3. Replace `tls: {}` with `tls: { certResolver: letsencrypt }` in routers.yml.

tls:
  stores:
    default:
      defaultCertificate:
        certFile: /certs/server.crt
        keyFile:  /certs/server.key

  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
