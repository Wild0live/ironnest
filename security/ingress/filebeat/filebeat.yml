# Filebeat — ships Traefik JSON access logs to the Wazuh indexer (OpenSearch).
# Reads from Docker's container log files (stdout capture) so Dozzle and
# Filebeat both see the same stream.
#
# Logs land in index traefik-access-YYYY.MM.DD.
# Create an index pattern traefik-access-* in the Wazuh/OpenSearch dashboard
# to query them (Stack Management → Index Patterns).

filebeat.inputs:
  - type: container
    id: traefik-access
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*.log
    stream: stdout
    processors:
      - drop_event:
          when:
            not:
              equals:
                container.name: "traefik"
      - decode_json_fields:
          fields: ["message"]
          target: ""
          overwrite_keys: true

processors:
  - add_fields:
      target: ""
      fields:
        log_source: traefik-ingress
        platform: ironnest

output.elasticsearch:
  hosts: ["https://wazuh.indexer:9200"]
  username: "admin"
  password: "${WAZUH_INDEXER_PASSWORD}"
  ssl:
    certificate_authorities: ["/certs/root-ca.pem"]
    verification_mode: certificate
  index: "traefik-access-%{+yyyy.MM.dd}"
  allow_older_versions: true

setup.ilm.enabled: false
setup.template.enabled: true
setup.template.name: "traefik-access"
setup.template.pattern: "traefik-access-*"
setup.template.overwrite: false

http.enabled: true
http.host: "127.0.0.1"
http.port: 5066

logging.level: info
logging.to_files: false
