infisical:
  address: "http://infisical:8090"

auth:
  type: "universal-auth"
  config:
    client-id: "/tmp/client-id"
    client-secret: "/tmp/client-secret"

sinks:
  - type: "file"
    config:
      path: "/secrets/agent-token"

templates:
  - source-path: "/agent-config/secrets.tmpl"
    destination-path: "/secrets/.env"
    config:
      polling-interval: "60s"
