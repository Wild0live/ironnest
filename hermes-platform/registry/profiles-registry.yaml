# hermes-platform — Profile registry
#
# Schema:        spec/registry.schema.json
# Validated by:  gateway/app/registry.py at startup and on
#                POST /admin/reload-policies
# Edited by:     scripts/create-profile.sh (append) and
#                scripts/delete-profile.sh (remove)
#
# DO NOT put bearer tokens in this file. Tokens live in Infisical at
# /hermes-platform/gateway → MEMORY_GATEWAY_PROFILE_TOKENS_JSON.
# This registry references profiles only by name.
#
# `description` is the declarative source of truth for kanban-decompose
# routing. scripts/sync-orchestrator-roster.sh materializes these into the
# orchestrator container's local profile roster (profile.yaml per profile)
# so `hermes kanban decompose` can route subtasks to the right specialist by
# role. Without a description a profile is "undescribed" and the decomposer
# can only fall back to the default_assignee (the orchestrator itself).

profiles:
  - name: default
    namespace: "viking://profiles/default/"
    approved_shared_namespace: "viking://shared/approved/default/"
    container_name: hermes-pf-default
    status: enabled
    policy_file: default.policy.yaml
    created_at: "2026-05-23T00:00:00Z"
    tags: ["seeded", "root-profile"]
    notes: "Successor to the existing hermes-gateway (default profile)."
    description: "Orchestrator and coordinating agent (Dr. Smith). Plans, decomposes, and routes multi-step and cross-domain work, then synthesizes results. Handles research, architecture, planning, automation, and analysis end-to-end, and delegates coding to Steve, trading to Mark, and security to Little John. Use for task breakdown, coordination, and strategy; default fallback when no single specialist fits."
  - name: mark
    namespace: "viking://profiles/mark/"
    approved_shared_namespace: "viking://shared/approved/mark/"
    container_name: hermes-pf-mark
    status: enabled
    policy_file: mark.policy.yaml
    created_at: "2026-05-23T00:00:00Z"
    tags: ["seeded", "trading"]
    notes: "PSE swing-trading operator persona."
    description: "Stock-trading specialist. Handles market research and the review and evaluation of trading strategies and trading plans. Research and review only."
  - name: steve
    namespace: "viking://profiles/steve/"
    approved_shared_namespace: "viking://shared/approved/steve/"
