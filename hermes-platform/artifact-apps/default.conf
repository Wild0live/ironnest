# Sandboxed static-app server for Kanban webapp deliverables.
#
# Serves COMPLETE static webapps straight off the shared Kanban artifacts volume,
# LIVE, at https://apps.ironnest.local/<task-id>/<app-folder>/. This is a SEPARATE
# browser origin from Mission Control (mission.ironnest.local), so agent-authored
# HTML/JS runs isolated — it cannot read MC's DOM, storage, or session. It is a
# dumb, read-only file server: no API, no secrets, no write path.
#
# The kanban-shared volume is mounted at /srv/kanban (read-only); artifacts live
# under its artifacts/ subdir, so the document root is /srv/kanban/artifacts.

server {
    listen 8080;
    server_name _;

    root /srv/kanban/artifacts;
    index index.html;
    autoindex off;          # never list directories (no artifact enumeration)
    charset utf-8;
    server_tokens off;

    # Applied to every response. The CSP is the real isolation lever:
    #   connect-src 'self'   → a served app cannot call back into Mission Control
    #                          (or any external host) via fetch/XHR/WebSocket.
    #   frame-ancestors      → only Mission Control (and same origin) may embed it.
    #   default-src 'self'   → no external CDNs; apps must be self-contained,
    #                          matching the platform's no-egress posture.
    # 'unsafe-inline'/'unsafe-eval' are permitted so ordinary generated apps with
    # inline <script>/<style> still run — isolation comes from the separate origin
    # + connect-src, not from blocking the app's own scripts.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self' data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; media-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'self' https://mission.ironnest.local; base-uri 'self'; form-action 'self'" always;

    # Never serve dotfiles (e.g. the .hidden soft-delete marker, .git, etc.).
    location ~ /\. { deny all; }

    location / {
        try_files $uri $uri/ =404;
    }

    # Lightweight liveness probe for the container healthcheck.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
