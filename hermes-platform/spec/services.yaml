    wiki:
      published_ro: D:/LLM Wiki/wiki:/knowledge/wiki
      proposals_rw: D:/LLM Wiki/wiki/_review/proposals:/knowledge/wiki/_review/proposals
      network: llm-wiki-wiki-net
      role_installer: D:/LLM Wiki/ironnest/install-bigbert-wiki-role.py
    healthcheck: "pgrep -f 'hermes gateway run'"
    resources:
