  - name: hermes-pf-littlejohn
    container_name: hermes-pf-littlejohn
    image: platform/hermes-agent:v2026.6.19-patched
    role: profile agent
    profile: littlejohn
    listens: ["8011/tcp"]
    publishes: []
    networks: [platform-net, hermes-platform-app-net, littlejohn-kali-net]
    memory_provider: ironnest_gateway
    memory_provider_mount: ./hermes-plugin/ironnest_gateway:/opt/data/plugins/ironnest_gateway:ro
    kanban:
      home: /opt/kanban
      volume: hermes-platform_kanban-shared
      role: shared board participant
    mission_control_bridge: ./agent-bridge/agent-chat-bridge.py:/opt/ironnest/agent-chat-bridge.py:ro
    shared_artifacts:
      own_rw: /opt/shared/mine
      all_ro: /opt/shared/all
    healthcheck: "pgrep -f 'hermes gateway run'"
    resources:
      cpus: "2.0"
      memory: 768M

  - name: kali-mcp-littlejohn
    container_name: kali-mcp-littlejohn
    image: platform/kali-mcp-littlejohn:2026.07.03
    upstream: https://github.com/k3nn3dy-ai/kali-mcp
    upstream_ref: d46b46bd23f9801b63fc3d16253b5af07b653ec9
    role: optional on-demand Kali Linux MCP sidecar for LittleJohn
    compose_profile: kali
    default_start: false
    listens: ["8000/tcp"]
    publishes: []
    networks: [littlejohn-kali-net, littlejohn-kali-egress-net]
    endpoint: http://kali-mcp-littlejohn:8000/sse
    mounts:
      - hermes-platform_littlejohn-kali-work:/work
      - ./shared/littlejohn/kali:/reports
    default_scope: lab-only
    lifecycle:
      preapproved_for_littlejohn: [start, stop, restart]
      approval_required_for: [image_changes, network_changes, host_ports, mounts, privileged_mode, docker_api, host_powershell]
    healthcheck: "pgrep -f 'kali_mcp_server.server'"
    resources:
      cpus: "2.0"
      memory: 2G

