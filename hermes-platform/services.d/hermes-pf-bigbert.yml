      MEMORY_GATEWAY_URL: "http://memory-gateway:8080"
      HERMES_GATEWAY_NO_SUPERVISE: "1"
      TELEGRAM_REQUIRE_MENTION: "true"
      HERMES_KANBAN_HOME: "/opt/kanban"   # join the shared Kanban board
      # Keep Wiki Chat responsive if CPU-only semantic-memory lookup is backlogged.
