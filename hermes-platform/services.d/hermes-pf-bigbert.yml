services:
  hermes-pf-bigbert:
    image: platform/hermes-agent:v2026.6.19-patched
    container_name: hermes-pf-bigbert
    restart: unless-stopped
    depends_on:
      memory-gateway: { condition: service_healthy }
    env_file:
      - path: ./.env
    environment:
      HERMES_UID: "10000"
      HERMES_GID: "10000"
      INFISICAL_PROJECT_ID: "49ef42ff-3eb8-49a8-8862-7e83aa674681"
      INFISICAL_PATH: "/hermes-platform/bigbert"
      HERMES_PROFILE: "bigbert"
      PATH: "/opt/hermes/.venv/bin:/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      TERMINAL_ENV: "local"
      HTTPS_PROXY: "http://squid:3128"
      HTTP_PROXY:  "http://squid:3128"
      NO_PROXY:    "memory-gateway,browser-intent-mcp,infisical,adguard,squid,socket-proxy,localhost,127.0.0.1,.local"
      https_proxy: "http://squid:3128"
      http_proxy:  "http://squid:3128"
